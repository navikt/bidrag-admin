name: Deploy dev fss
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
      - '!main'
    paths:
      - '.nais/bidrag-admin-fss/**.yaml'
      - '.github/workflows/admin_fss_deploy_dev.yaml'
      - 'pom.xml'
      - '**/bidrag-admin-fss/**'

jobs:
  build_and_deploy:
    name: "Build and deploy to dev"
    permissions:
      contents: "read"
      id-token: "write"
    uses: navikt/bidrag-workflow/.github/workflows/deploy.yaml@main
    secrets: inherit
    with:
      nais_cluster: fss
      maven_options: -B -q -fae -f bidrag-admin-fss
      ktlint_options: -f bidrag-admin-fss
      docker_context: ./bidrag-admin-fss
      dockerfile_with_path: ./bidrag-admin-fss/Dockerfile

      nais_variabler_filnavn: bidrag-admin-fss/dev.yaml
      nais_hovedfil_navn: bidrag-admin-fss/nais.yaml
      image_suffix: bidrag-admin-fss
      tag: bidrag-admin-fss